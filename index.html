<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Переход в Telegram</title>

    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;

            background-color: #18222d;
            background-image: url('./images/bg-pattern.png');
            background-repeat: repeat;
            background-size: 300px;
        }

        /* Затемнение как в Telegram */
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: rgba(24,34,45,0.88);
            pointer-events: none;
        }

        .card {
            position: relative;
            z-index: 1;

            background-color: white;
            width: 90%;
            max-width: 350px;
            padding: 40px 25px;
            border-radius: 28px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.25);
            text-align: center;
            box-sizing: border-box;
        }

        .logo-circle {
            width: 80px;
            height: 80px;
            background-color: #f0f0f0;
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #e0e0e0;
        }

        .logo-circle img {
            width: 60%;
            height: 60%;
            object-fit: contain;
        }

        h1 {
            font-size: 22px;
            margin: 0 0 10px;
            color: #1a1a1a;
        }

        h2 {
            font-size: 16px;
            margin: 0 0 15px;
            color: #333;
            line-height: 1.4;
        }

        p {
            font-size: 14px;
            color: #666;
            line-height: 1.5;
            margin-bottom: 25px;
        }

        .btn {
            display: block;
            background-color: #0088cc;
            color: white;
            text-decoration: none;
            padding: 16px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 16px;
            transition: transform 0.2s;
        }

        .btn:active {
            transform: scale(0.97);
        }

        .footer {
            position: absolute;
            bottom: 20px;
            width: 100%;
            text-align: center;
            color: rgba(255,255,255,0.4);
            font-size: 11px;
        }

        .footer a {
            color: rgba(255,255,255,0.4);
            text-decoration: none;
            margin: 0 5px;
        }
    </style>
</head>

<body>

    <div class="card">
        <div class="logo-circle">
            <img src="./images/logo.png" alt="logo">
        </div>

        <h1>САМОГИПНОЗ</h1>
        <h2>Аудио-техника для быстрого снятия тревоги</h2>

        <p>В боте вас ждет практика для переключения автоматических программ подсознания.</p>

        <a href="https://rejusl.online" class="btn">ПЕРЕЙТИ В БОТ</a>
    </div>

    <div class="footer">
        © 2024 Все права защищены<br>
        <a href="#">Политика конфиденциальности</a> | <a href="#">Контакты</a>
    </div>

</body>
</html>
