<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Переход в Telegram</title>
    <style>
        /* Стили фона и центрирования */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            
            /* Фон: Градиент + Паттерн (фигурки) */
            background-color: #121d17;
            background-image: 
                url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://w3.org fill='%23ffffff' fill-opacity='0.04' fill-rule='evenodd'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/svg%3E"),
                radial-gradient(circle at center, #1c2d25 0%, #121d17 100%);
        }

        /* Белая карточка */
        .card {
            background-color: white;
            width: 90%;
            max-width: 350px;
            padding: 40px 25px;
            border-radius: 28px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            text-align: center;
            box-sizing: border-box;
            z-index: 1;
        }

        /* Круглое лого */
        .logo-circle {
            width: 80px;
            height: 80px;
            background-color: #f0f0f0;
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #e0e0e0;
            font-size: 40px; /* Увеличил эмодзи */
        }

        /* Тексты */
        h1 {
            font-size: 22px;
            margin: 0 0 10px;
            color: #1a1a1a;
            letter-spacing: 1px;
        }
        h2 {
            font-size: 16px;
            margin: 0 0 15px;
            color: #333;
            line-height: 1.4;
            font-weight: 500;
        }
        p {
            font-size: 14px;
            color: #666;
            line-height: 1.5;
            margin-bottom: 25px;
        }

        /* Кнопка */
        .btn {
            display: block;
            background-color: #0088cc;
            color: white;
            text-decoration: none;
            padding: 16px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 16px;
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px rgba(0, 136, 204, 0.3);
        }
        .btn:active {
            transform: scale(0.96);
        }

        /* Подвал */
        .footer {
            position: absolute;
            bottom: 20px;
            width: 100%;
            text-align: center;
            color: rgba(255,255,255,0.3);
            font-size: 11px;
        }
        .footer a {
            color: rgba(255,255,255,0.3);
            text-decoration: none;
            margin: 0 5px;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="logo-circle">🧘‍♂️</div> 
        
        <h1>САМОГИПНОЗ</h1>
        <h2>Аудио-техника для быстрого снятия тревоги</h2>
        
        <p>В боте вас ждет практика для переключения автоматических программ подсознания.</p>

        <a href="https://rejusl.online" class="btn">ПЕРЕЙТИ В БОТ</a>
    </div>

    <div class="footer">
        © 2024 Все права защищены<br>
        <a href="#">Политика конфиденциальности</a> | <a href="#">Контакты</a>
    </div>

</body>
</html>
